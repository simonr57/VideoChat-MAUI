<svg width="456" height="456" viewBox="0 0 456 456" version="1.1"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     xml:space="preserve" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;">

  <defs>
    <linearGradient id="gradient2" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Everything grouped + scaled -->
  <g transform="translate(80,0) scale(0.7)">
    <!-- Smaller circle -->
    <circle cx="228" cy="228" r="210" fill="url(#gradient2)" filter="url(#softGlow)"/>

    <!-- Speech bubble -->
    <path d="M228 160C190 160 160 190 160 228V268C160 306 190 336 228 336H248L260 352L280 336H296C334 336 364 306 364 268V228C364 190 334 160 296 160H228Z"
					  fill="black" stroke="#E5E7EB" stroke-width="2"/>

    <!-- Reply lines -->
    <path d="M200 240H280M200 260H240"
				  stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
  </g>

  <circle cx="150" cy="350" r="15" fill="#f2f2f2" opacity="0.9"/>
  <circle cx="200" cy="350" r="15" fill="#f2f2f2" opacity="0.7"/>
  <circle cx="250" cy="350" r="15" fill="#f2f2f2" opacity="0.5"/>
  <circle cx="300" cy="350" r="15" fill="#f2f2f2" opacity="0.3"/>
  <circle cx="350" cy="350" r="15" fill="#f2f2f2" opacity="0.1"/>



  <!-- Loading text -->
<text x="238" y="445" text-anchor="middle" font-weight="bold"
				  font-family="Arial, sans-serif" font-size="36" fill="#ffffff"
				  shape-rendering="geometricPrecision">
  LOADING  
</text>
</svg>