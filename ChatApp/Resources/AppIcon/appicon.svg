<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" xmlns="http://www.w3.org/2000/svg">
	<!-- Dynamic gradient circle (feels "lit" from below) -->
	<defs>
		<linearGradient id="gradient2" x1="50%" y1="100%" x2="50%" y2="0%">
			<stop offset="100%" stop-color="#000000"/>

		</linearGradient>
		<filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
			<feGaussianBlur stdDeviation="8" result="blur"/>
			<feComposite in="SourceGraphic" in2="blur" operator="over"/>
		</filter>
	</defs>

	<!-- Outer circle with subtle glow -->
	<circle cx="228" cy="228" r="210" fill="url(#gradient2)" filter="url(#softGlow)"/>

	<!-- Abstract speech bubble (sleek + asymmetrical) -->
	<path d="M228 160C190 160 160 190 160 228V268C160 306 190 336 228 336H248L260 352L280 336H296C334 336 364 306 364 268V228C364 190 334 160 296 160H228Z"
          fill="white" stroke="#E5E7EB" stroke-width="2"/>

	<!-- Floating "reply" line (modern touch) -->
	<path d="M200 240H280M200 260H240" stroke="#000000" stroke-width="12" stroke-linecap="round"/>

</svg>